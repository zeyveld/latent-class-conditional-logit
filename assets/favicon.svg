<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LCL favicon">
  <title>LCL</title>
  <!-- Same composition as the full logo, with thicker proportional strokes
       so the fork survives 16x16 rasterisation. -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#3F2B47"/>

  <g fill="none" stroke="#F4ECDC" stroke-width="5" stroke-linecap="round">
    <line x1="32" y1="52" x2="32" y2="36"/>
    <line x1="32" y1="36" x2="16" y2="20"/>
    <line x1="32" y1="36" x2="32" y2="14"/>
    <line x1="32" y1="36" x2="48" y2="20"/>
  </g>

  <circle cx="16" cy="20" r="7" fill="#8FAD8A"/>
  <circle cx="32" cy="14" r="8" fill="#E37449"/>
  <circle cx="48" cy="20" r="7" fill="#E3B53A"/>
</svg>
