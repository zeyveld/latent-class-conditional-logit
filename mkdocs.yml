site_name: LCL
site_description: A JAX-accelerated Python package for latent-class conditional logit models.
site_url: https://zeyveld.github.io/latent-class-conditional-logit/
repo_url: https://github.com/zeyveld/latent-class-conditional-logit

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font: false  # disable Material's Google Fonts; Luciole is self-hosted via extra.css
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: numpy
            merge_init_into_class: true
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - Tutorials:
      - Estimation & counterfactuals: tutorials/estimation.md
      - Cross-validation & model selection: tutorials/cross_validation.md
  - API Reference:
      - Latent-class logit: api/latent_class.md
      - Conditional logit: api/conditional_logit.md
      - Cross-validation: api/cross_validation.md

extra_javascript:
  - https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?version=4.8.0&features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
