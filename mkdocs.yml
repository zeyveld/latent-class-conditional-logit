site_name: LCL
site_url: https://zeyveld.github.io/latent-class-conditional-logit/
repo_url: https://github.com/zeyveld/latent-class-conditional-logit

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"] 
          options:
            docstring_style: numpy
            merge_init_into_class: true
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - API Reference:
    - Latent-Class Logit: api/latent_class.md
    - Standard Conditional Logit: api/conditional_logit.md
    - Model Selection (WIP): api/cross_validation.md

extra_javascript:
  - https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?version=4.8.0&features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js