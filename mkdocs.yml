site_name: LCL
site_url: https://your-username.github.io/latent-class-conditional-logit/
repo_url: https://github.com/your-username/latent-class-conditional-logit

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"] 
          options:
            docstring_style: numpy
            merge_init_into_class: true
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.math:
      enable_dollar_delimiter: true
      enable_block_math: true
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - API Reference:
    - Estimator: api/estimator.md