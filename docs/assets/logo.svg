<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="LCL logo">
  <title>LCL</title>
  <desc>Three overlapping circles in persimmon, sage, and saffron on an aubergine ground — three latent classes within a single population.</desc>
  <!-- Outer ground: rounded square in aubergine -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#3F2B47"/>
  <!-- Three latent-class discs, arranged in an equilateral triangle, blending where they meet -->
  <g style="mix-blend-mode: screen;">
    <circle cx="128" cy="96" r="50" fill="#E37449"/>
    <circle cx="89" cy="162" r="50" fill="#8FAD8A"/>
    <circle cx="167" cy="162" r="50" fill="#E3B53A"/>
  </g>
  <!-- Subtle highlight ring on the top disc to suggest the observed choice -->
  <circle cx="128" cy="96" r="50" fill="none" stroke="#F4ECDC" stroke-width="3" stroke-opacity="0.85"/>
</svg>
